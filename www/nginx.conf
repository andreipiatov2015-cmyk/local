worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

application live {
    live on;
    record off;

    # включаем HLS
    hls on;
    hls_path /var/www/hls;
    hls_fragment 3;
    hls_playlist_length 300;
    hls_cleanup on;

    # Отправляем события publish => скрипт стартует при публикации потока
    exec_push /usr/bin/python3 /var/www/live-server/start_vk.py $name;
}
    }
}

http {
    include        /usr/local/nginx/conf/mime.types;
    default_type  application/octet-stream;

    server {
        listen 8080;

        location /hls {
            root /var/www;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache;
            add_header 'Access-Control-Allow-Origin' '*';
        }
    }
}
