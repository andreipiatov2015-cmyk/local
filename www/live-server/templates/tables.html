<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблицы заявок конкурса</title>
  <link rel="stylesheet" href="/static/tables.css" />
</head>
<body>
  <main class="container">
    <h1>Таблицы заявок конкурса</h1>

    <section id="workspace" class="card">
      <h2>Таблицы</h2>
      <div class="row">
        <input id="newTitle" placeholder="Название таблицы" />
        <button id="createTable">Создать</button>
      </div>
      <ul id="tableList"></ul>
    </section>

    <section id="tableView" class="card hidden">
      <h2 id="tableTitle">Таблица</h2>
      <div class="row wrap">
        <input type="file" id="excelFile" accept=".xlsx,.xls" />
        <button id="uploadExcel">Загрузить Excel</button>
        <button id="connectYandex">Подключить Яндекс</button>
        <button id="openAdminLogin" class="hidden">Открыть вход администратора (VNC)</button>
        <button id="startDownload" disabled>Старт скачивания</button>
      </div>
      <p id="progress"></p>
      <p id="yandexStatus">Яндекс: не подключен</p>
      <p id="yandexHint"></p>
      <div id="mappingInfo" class="mapping-info"></div>
      <div class="table-scroll">
        <table id="excelTable">
          <thead id="excelHead"></thead>
          <tbody id="excelBody"></tbody>
        </table>
      </div>
    </section>

    <dialog id="mappingDialog">
      <h3>Назначение колонки</h3>
      <div id="mappingDialogActions" class="mapping-dialog-actions"></div>
      <button id="closeMappingDialog">Закрыть</button>
    </dialog>
  </main>
  <script src="/static/tables.js"></script>
</body>
</html>
