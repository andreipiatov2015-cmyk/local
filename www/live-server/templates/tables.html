<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблицы заявок конкурса</title>
  <link rel="stylesheet" href="/static/admin.css" />
  <link rel="stylesheet" href="/static/tables.css" />
</head>
<body class="tables-page">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">🎥 Live Admin</span>
      <button id="collapseSidebar" aria-label="Свернуть меню">❮</button>
    </div>

    <nav class="sidebar-menu">
      <a class="menu-item" href="/admin">
        <span class="icon">✏️</span>
        <span class="text">Редактор</span>
      </a>
      <a class="menu-item" href="/competition">
        <span class="icon">🏆</span>
        <span class="text">Конкурс</span>
      </a>
      <a class="menu-item" href="/broadcast">
        <span class="icon">📺</span>
        <span class="text">Трансляция</span>
      </a>
      <a class="menu-item" href="/staff">
        <span class="icon">👥</span>
        <span class="text">Сотрудники</span>
      </a>
      <a class="menu-item active" href="/tables">
        <span class="icon">📋</span>
        <span class="text">Таблицы заявок</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="/logout" class="menu-item logout">
        <span class="icon">🚪</span>
        <span class="text">Выход</span>
      </a>
    </div>
  </aside>

  <main class="content container tables-content">
    <section class="card page-card">
      <div class="tables-list-header">
        <div>
          <h1 class="page-title">Таблицы заявок</h1>
          <p class="page-subtitle">Список созданных таблиц пользователя.</p>
        </div>
        <button id="createTable" class="btn btn-primary" type="button">Создать новую таблицу</button>
      </div>
      <p id="listStatus" class="status status-muted">Загрузка...</p>
      <ul id="tableList" class="table-list"></ul>
    </section>
  </main>

  <script src="/static/layout.js"></script>
  <script src="/static/tables.js"></script>
</body>
</html>
