<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблицы заявок конкурса</title>
  <link rel="stylesheet" href="/static/admin.css" />
  <link rel="stylesheet" href="/static/tables.css" />
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">🎥 Live Admin</span>
      <button id="collapseSidebar" aria-label="Свернуть меню">❮</button>
    </div>

    <nav class="sidebar-menu">
      <a class="menu-item" href="/admin">
        <span class="icon">✏️</span>
        <span class="text">Редактор</span>
      </a>
      <a class="menu-item" href="/competition">
        <span class="icon">🏆</span>
        <span class="text">Конкурс</span>
      </a>
      <a class="menu-item" href="/broadcast">
        <span class="icon">📺</span>
        <span class="text">Трансляция</span>
      </a>
      <a class="menu-item" href="/staff">
        <span class="icon">👥</span>
        <span class="text">Сотрудники</span>
      </a>
      <a class="menu-item active" href="/tables">
        <span class="icon">📋</span>
        <span class="text">Таблицы заявок</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="/logout" class="menu-item logout">
        <span class="icon">🚪</span>
        <span class="text">Выход</span>
      </a>
    </div>
  </aside>

  <main class="content tables-content">
    <section id="workspace" class="card">
      <h1 class="page-title">Таблицы заявок конкурса</h1>
      <div class="row">
        <input id="newTitle" placeholder="Название таблицы" />
        <button id="createTable" class="btn btn-primary">Создать</button>
      </div>
      <ul id="tableList"></ul>
    </section>

    <section id="tableView" class="card hidden">
      <h2 id="tableTitle">Таблица</h2>
      <div class="row wrap">
        <input type="file" id="excelFile" accept=".xlsx,.xls" />
        <button id="uploadExcel" class="btn btn-secondary">Загрузить Excel</button>
        <button id="connectYandex" class="btn btn-secondary">Подключить Яндекс</button>
        <button id="openAdminLogin" class="btn btn-secondary hidden">Открыть вход администратора (VNC)</button>
        <button id="startDownload" class="btn btn-primary" disabled>Старт скачивания</button>
      </div>
      <p id="progress"></p>
      <p id="yandexStatus">Яндекс: не подключен</p>
      <p id="yandexHint"></p>
      <p id="previewError" class="preview-error hidden"></p>
      <div class="table-layout">
        <div class="table-scroll">
          <table id="excelTable">
            <thead id="excelHead"></thead>
            <tbody id="excelBody"></tbody>
          </table>
        </div>

        <aside id="mappingPanel" class="mapping-panel is-collapsed">
          <button id="toggleMappingPanel" class="mapping-panel-toggle" type="button">Схема колонок</button>
          <div id="mappingCompact" class="mapping-compact"></div>
          <div id="mappingExpanded" class="mapping-expanded hidden">
            <div id="mappingInfo" class="mapping-info"></div>
            <button id="resetMapping" class="btn btn-secondary" type="button">Сбросить схему</button>
            <p class="mapping-hint">Для скачивания обязательны: «Название номера», «ФИО участника(ов)», и «За кого оплата» (если указана квитанция).</p>
          </div>
        </aside>
      </div>
    </section>

    <dialog id="mappingDialog">
      <h3>Назначение колонки</h3>
      <div id="mappingDialogActions" class="mapping-dialog-actions"></div>
      <button id="closeMappingDialog" class="btn btn-secondary">Закрыть</button>
    </dialog>
  </main>

  <script src="/static/layout.js"></script>
  <script src="/static/tables.js"></script>
</body>
</html>
