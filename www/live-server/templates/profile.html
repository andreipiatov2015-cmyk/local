<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Профиль</title>
  <style>
    body{margin:0;min-height:100vh;background:#0b1220;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
     display:flex;align-items:center;justify-content:center}
.card{width:560px;background:#0f172a;border:1px solid #1f2937;border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);padding:24px;transition:transform .3s}
.card:hover{transform:scale(1.02)}
h2{margin:0 0 10px}
.muted{color:#9ca3af}
.row{display:flex;gap:18px;margin-top:14px}
.badge{background:#1d4ed8;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}
a.btn{display:inline-block;margin-top:18px;background:linear-gradient(90deg,#3b82f6,#06b6d4);
      padding:10px 14px;border-radius:10px;text-decoration:none;color:white;font-weight:700}
a.btn:hover{filter:brightness(1.05)}

  </style>
</head>
<body>
  <div class="card">
    <h2>Профиль</h2>
    <div class="muted">Добро пожаловать, {{ user.username }} ({{ user.email }})</div>
    <div class="row">
      <div>Роль:</div>
      <div class="badge">{{ user.role }}</div>
    </div>
    <a class="btn" href="/admin">В панель</a>
    <a class="btn" href="/logout" style="margin-left:8px;background:linear-gradient(90deg,#f97316,#ef4444)">Выйти</a>
  </div>
</body>
</html>
