<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Профиль</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <aside class="sidebar">
      <div class="sidebar-header">
          <span class="logo">🎥 Live Admin</span>
          <button id="collapseSidebar">❮</button>
      </div>
      <nav class="sidebar-menu">
          <a class="menu-item" href="/admin">
              <span class="icon">✏️</span>
              <span class="text">Редактор</span>
          </a>
          <a class="menu-item" href="/admin">
              <span class="icon">📥</span>
              <span class="text">Автодобавление</span>
          </a>
          <a class="menu-item" href="/competition">
              <span class="icon">🏆</span>
              <span class="text">Конкурс</span>
          </a>
          <a class="menu-item" href="/broadcast">
              <span class="icon">📺</span>
              <span class="text">Трансляция</span>
          </a>
          <a class="menu-item" href="/staff">
              <span class="icon">👥</span>
              <span class="text">Сотрудники</span>
          </a>
      </nav>
      <div class="sidebar-footer">
          <a href="/logout" class="menu-item logout">
              <span class="icon">🚪</span>
              <span class="text">Выход</span>
          </a>
      </div>
  </aside>

  <main class="content auth-page">
    <div class="card auth-card">
      <h2>Профиль</h2>
      <div class="page-subtitle">Добро пожаловать, {{ user.username }} ({{ user.email }})</div>
      <div class="vk-actions" style="margin-top:16px;">
        <div>Роль:</div>
        <div class="badge">{{ user.role }}</div>
      </div>
      <div class="vk-actions" style="margin-top:20px;">
        <a class="btn btn-primary" href="/admin">В панель</a>
        <a class="btn btn-danger" href="/logout">Выйти</a>
      </div>
    </div>
  </main>

  <script src="/static/layout.js"></script>
</body>
</html>
