<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Трансляция</title>
  <link rel="stylesheet" href="/static/admin.css" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.12/dist/hls.min.js"></script>
</head>

<body class="broadcast-page">
  <main class="broadcast-fullscreen">
    <div class="broadcast-layout broadcast-layout-fullscreen">
      <div class="broadcast-player card">
        <h2 class="page-title">Трансляция</h2>
        <div class="broadcast-media">
          <video id="video" controls></video>
          <img id="broadcastPreview" alt="Превью трансляции" />
        </div>
      </div>

      <div class="broadcast-list card">
        <h2 class="page-title">Список выступающих</h2>
        <div id="entries" class="entries-list"></div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById("video");
      const previewImage = document.getElementById("broadcastPreview");

      // --- HLS recovery state ---
      let hls = null;
      let lastStreamUrl = "";
      let lastPreviewUrl = "";
      let retryTimer = null;
      let statusTimer = null;
      let isPreviewForcedByStatus = false;

      function showPreviewImage(url) {
        if (!previewImage) return;
        if (url) previewImage.src = url;
        previewImage.classList.add("visible");
        if (video) video.style.display = "none";
      }

      function showVideo() {
        if (video) video.style.display = "";
        previewImage?.classList.remove("visible");
      }

      function cleanupPlayer() {
        if (retryTimer) {
          clearTimeout(retryTimer);
          retryTimer = null;
        }

        if (hls) {
          try { hls.destroy(); } catch (_) {}
          hls = null;
        }

        if (video) {
          try { video.pause(); } catch (_) {}
          video.removeAttribute("src");
          video.load();
        }
      }

      function scheduleRetry(delayMs = 2500) {
        if (retryTimer) return;
        retryTimer = setTimeout(() => {
          retryTimer = null;
          if (isPreviewForcedByStatus) return;
          if (!lastStreamUrl) return;
          initPlayer(lastStreamUrl, lastPreviewUrl);
        }, delayMs);
      }

      function withNoCache(url) {
        if (!url) return "";
        const sep = url.includes("?") ? "&" : "?";
        return url + sep + "t=" + Date.now();
      }

      function initPlayer(streamUrl, previewUrl) {
        if (!video) return;

        lastStreamUrl = streamUrl || "";
        lastPreviewUrl = previewUrl || "";

        cleanupPlayer();

        // Пока грузим — можно показать превью (потом уберём на playing/canplay)
        if (lastPreviewUrl) showPreviewImage(lastPreviewUrl);

        if (!lastStreamUrl) {
          showPreviewImage(lastPreviewUrl);
          return;
        }

        const streamUrlNoCache = withNoCache(lastStreamUrl);
        const HlsCtor = globalThis.Hls;

        // Если реально пошло видео — скрываем превью
        const onReadyToPlay = () => showVideo();
        video.addEventListener("playing", onReadyToPlay);
        video.addEventListener("canplay", onReadyToPlay);

        // Chrome/Firefox/Edge через hls.js
        if (HlsCtor && HlsCtor.isSupported()) {
          hls = new HlsCtor();
          hls.loadSource(streamUrlNoCache);
          hls.attachMedia(video);

          hls.on(HlsCtor.Events.MANIFEST_PARSED, () => {
            showVideo();
            video.play().catch(() => {
              // автоплей может быть запрещён — не критично
            });
          });

          hls.on(HlsCtor.Events.ERROR, (event, data) => {
            // Только фатальные ошибки требуют пересоздания
            if (!data || !data.fatal) return;
            showPreviewImage(lastPreviewUrl);
            scheduleRetry(2500);
          });

          return;
        }

        // Safari/iOS: нативный HLS
        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = streamUrlNoCache;

          video.addEventListener("loadedmetadata", () => {
            showVideo();
            video.play().catch(() => {});
          }, { once: true });

          video.addEventListener("error", () => {
            showPreviewImage(lastPreviewUrl);
            scheduleRetry(2500);
          });

          video.addEventListener("ended", () => {
            showPreviewImage(lastPreviewUrl);
            scheduleRetry(2500);
          });

          return;
        }

        // если совсем никак
        showPreviewImage(lastPreviewUrl);
      }

      async function pollStatus() {
        try {
          const r = await fetch("/vk/public_status", { cache: "no-store" });
          const status = await r.json();

          const streamUrl = status.stream_url || "";
          const previewUrl = status.preview_url || "";
          const showPreview = Boolean(status.show_preview);

          isPreviewForcedByStatus = showPreview;

          // Сервер сказал показывать превью — не пытаемся оживлять
          if (showPreview || !streamUrl) {
            lastPreviewUrl = previewUrl || lastPreviewUrl;
            showPreviewImage(lastPreviewUrl);
            cleanupPlayer();
            return;
          }

          const urlChanged = streamUrl !== lastStreamUrl;
          const previewVisible = previewImage?.classList.contains("visible");

          if (urlChanged || previewVisible || !lastStreamUrl) {
            initPlayer(streamUrl, previewUrl);
          }
        } catch (_) {
          // статус не получили — просто попробуем позже
        }
      }

      // --- Entries (как у тебя) ---
      const broadcastLayout = document.querySelector(".broadcast-layout");

      function loadEntries() {
        fetch("/entries")
          .then((r) => r.json())
          .then((data) => {
            const entriesContainer = document.getElementById("entries");
            if (!entriesContainer) return;

            broadcastLayout?.classList.toggle("broadcast-layout-no-list", data.length === 0);

            entriesContainer.innerHTML = "";

            data.forEach((entry) => {
              const entryDiv = document.createElement("div");
              entryDiv.classList.add("entry");
              entryDiv.innerHTML = `
                <span class="entry-field" id="entry-number-${entry.id}">№${entry.id}</span>
                <span class="entry-field" id="entry-fio-${entry.id}">${entry.name || ""}</span>
                <span class="entry-field" id="entry-act-${entry.id}">${entry.performance || ""}</span>
                <span class="entry-field" id="entry-team-${entry.id}">
                  ${entry.group || ""}${entry.territory ? ", " + entry.territory : ""}
                </span>
              `;
              entriesContainer.appendChild(entryDiv);
            });

            applyPreviewLayout();
          })
          .catch(() => {
            const entriesContainer = document.getElementById("entries");
            if (entriesContainer) entriesContainer.innerHTML = "<p>Ошибка загрузки данных.</p>";
          });
      }

      function applyPreviewLayout() {
        const layout = JSON.parse(localStorage.getItem("previewLayout") || "{}");

        document.querySelectorAll(".entry").forEach((entry) => {
          const firstField = entry.querySelector(".entry-field");
          if (!firstField) return;

          const id = firstField.id.split("-")[2];

          const fields = [
            { selector: `#entry-number-${id}`, key: "number" },
            { selector: `#entry-fio-${id}`, key: "fio" },
            { selector: `#entry-act-${id}`, key: "act" },
            { selector: `#entry-team-${id}`, key: "team" },
          ];

          fields.forEach((field) => {
            const element = entry.querySelector(field.selector);
            if (!element) return;
            if (!layout[field.key]) return;

            Object.assign(element.style, {
              left: layout[field.key].left || "0px",
              top: layout[field.key].top || "0px",
              fontSize: layout[field.key].fontSize || "16px",
              fontFamily: layout[field.key].fontFamily || "Arial",
              fontWeight: layout[field.key].fontWeight || "normal",
              fontStyle: layout[field.key].fontStyle || "normal",
              textAlign: layout[field.key].textAlign || "left",
              alignItems: layout[field.key].alignItems || "flex-start",
            });
          });
        });
      }

      // --- Start everything ---
      pollStatus();
      statusTimer = setInterval(pollStatus, 4000);

      loadEntries();
      setInterval(loadEntries, 10000);
    });
  </script>
</body>
</html>
