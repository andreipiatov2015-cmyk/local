<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Трансляция</title>
  <link rel="stylesheet" href="/static/admin.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.12/dist/hls.min.js"></script>
</head>

<body class="broadcast-page">
  <main class="broadcast-fullscreen">
    <div class="broadcast-layout broadcast-layout-fullscreen">
      <div class="broadcast-player card">
        <h2 class="page-title">Трансляция</h2>
        <div class="broadcast-media">
          <video id="video" controls></video>
          <img id="broadcastPreview" alt="Превью трансляции">
        </div>
      </div>

      <div class="broadcast-list card">
        <h2 class="page-title">Список выступающих</h2>
        <div id="entries" class="entries-list"></div>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById("video");
      const previewImage = document.getElementById("broadcastPreview");

      function showPreviewImage(url) {
        if (!previewImage) return;
        if (!url) return;
        previewImage.src = url;
        previewImage.classList.add("visible");
        if (video) video.style.display = "none";
      }

      function showVideo() {
        if (video) video.style.display = "";
        previewImage?.classList.remove("visible");
      }

      function initPlayer(streamUrl, previewUrl) {
        if (!video) return;

        if (previewUrl) showPreviewImage(previewUrl);

        if (!streamUrl) {
          showPreviewImage(previewUrl);
          return;
        }

        const HlsCtor = globalThis.Hls;

        // Chrome/Firefox/Edge через hls.js
        if (HlsCtor && HlsCtor.isSupported()) {
          const hls = new HlsCtor();
          hls.loadSource(streamUrl);
          hls.attachMedia(video);

          hls.on(HlsCtor.Events.MANIFEST_PARSED, () => {
            showVideo();
            video.play().catch(() => {
              // автоплей может быть запрещён — это не критично
            });
          });

          hls.on(HlsCtor.Events.ERROR, () => {
            showPreviewImage(previewUrl);
          });

          return;
        }

        // Safari/iOS: нативный HLS
        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = streamUrl;

          video.addEventListener("loadedmetadata", () => {
            showVideo();
            video.play().catch(() => {});
          });

          video.addEventListener("error", () => {
            showPreviewImage(previewUrl);
          });

          video.addEventListener("ended", () => {
            showPreviewImage(previewUrl);
          });

          return;
        }

        // если совсем никак
        showPreviewImage(previewUrl);
      }

      // Получаем публичный статус VK (stream_url / preview_url)
      fetch("/vk/public_status")
        .then((r) => r.json())
        .then((status) => {
          initPlayer(
            status.stream_url || "",
            status.preview_url || "",
            Boolean(status.show_preview)
          );
        })
        .catch(() => {
          initPlayer("", "", true);
        });

      function loadEntries() {
        fetch("/entries")
          .then((r) => r.json())
          .then((data) => {
            const entriesContainer = document.getElementById("entries");
            if (!entriesContainer) return;

            entriesContainer.innerHTML = "";

            data.forEach((entry) => {
              const entryDiv = document.createElement("div");
              entryDiv.classList.add("entry");
              entryDiv.innerHTML = `
                <span class="entry-field" id="entry-number-${entry.id}">№${entry.id}</span>
                <span class="entry-field" id="entry-fio-${entry.id}">${entry.name || ""}</span>
                <span class="entry-field" id="entry-act-${entry.id}">${entry.performance || ""}</span>
                <span class="entry-field" id="entry-team-${entry.id}">
                  ${entry.group || ""}${entry.territory ? ", " + entry.territory : ""}
                </span>
              `;
              entriesContainer.appendChild(entryDiv);
            });

            applyPreviewLayout();
          })
          .catch(() => {
            const entriesContainer = document.getElementById("entries");
            if (entriesContainer) entriesContainer.innerHTML = "<p>Ошибка загрузки данных.</p>";
          });
      }

      function applyPreviewLayout() {
        const layout = JSON.parse(localStorage.getItem("previewLayout") || "{}");

        document.querySelectorAll(".entry").forEach((entry) => {
          const firstField = entry.querySelector(".entry-field");
          if (!firstField) return;

          const id = firstField.id.split("-")[2];

          const fields = [
            { selector: `#entry-number-${id}`, key: "number" },
            { selector: `#entry-fio-${id}`, key: "fio" },
            { selector: `#entry-act-${id}`, key: "act" },
            { selector: `#entry-team-${id}`, key: "team" },
          ];

          fields.forEach((field) => {
            const element = entry.querySelector(field.selector);
            if (!element) return;
            if (!layout[field.key]) return;

            Object.assign(element.style, {
              left: layout[field.key].left || "0px",
              top: layout[field.key].top || "0px",
              fontSize: layout[field.key].fontSize || "16px",
              fontFamily: layout[field.key].fontFamily || "Arial",
              fontWeight: layout[field.key].fontWeight || "normal",
              fontStyle: layout[field.key].fontStyle || "normal",
              textAlign: layout[field.key].textAlign || "left",
              alignItems: layout[field.key].alignItems || "flex-start",
            });
          });
        });
      }

      loadEntries();
      setInterval(loadEntries, 10000);
    });
  </script>
</body>
</html>
