<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="auth-page">
  <form class="card auth-card auth-form" method="post" action="/register">
    <h2>Регистрация</h2>
    <div class="form-field">
      <label for="username">Имя пользователя</label>
      <input id="username" type="text" name="username" required />
    </div>
    <div class="form-field">
      <label for="email">E-mail</label>
      <input id="email" type="email" name="email" required />
    </div>
    <div class="form-field auth-form-grid">
      <div>
        <label for="password">Пароль</label>
        <input id="password" type="password" name="password" required />
      </div>
      <div>
        <label for="confirm">Повтор пароля</label>
        <input id="confirm" type="password" name="confirm" required />
      </div>
    </div>
    {% if status_message %}
    <div class="auth-alert auth-alert-success">{{ status_message }}</div>
    {% endif %}
    {% if error_message %}
    <div class="auth-alert auth-alert-error">{{ error_message }}</div>
    {% endif %}
    <button type="submit" class="btn btn-primary auth-submit">Создать аккаунт</button>
    <a href="/login" class="auth-text-link">У меня уже есть аккаунт</a>
  </form>
</body>
</html>
