<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Регистрация</title>
  <style>
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#22c55e 0%,#3b82f6 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .card{width:420px;background:rgba(17,24,39,.9);border:1px solid rgba(255,255,255,.08);border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:28px;color:#e5e7eb}
    h2{margin:0 0 16px;font-size:22px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    label{display:block;font-size:13px;color:#cbd5e1;margin:12px 0 6px}
    input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #374151;background:#0b1220;color:#e5e7eb}
    input:focus{border-color:#22c55e;box-shadow:0 0 0 4px rgba(34,197,94,.15);outline:none}
    button{width:100%;margin-top:16px;padding:12px 14px;border:0;border-radius:10px;background:linear-gradient(90deg,#22c55e,#10b981);color:white;font-weight:700;cursor:pointer}
    button:hover{filter:brightness(1.05)}
    a{color:#93c5fd;text-decoration:none;font-size:14px}
  </style>
</head>
<body>
  <form class="card" method="post" action="/register">
    <h2>Регистрация</h2>
    <label>Имя пользователя</label>
    <input type="text" name="username" required />
    <label>E-mail</label>
    <input type="email" name="email" required />
    <div class="grid">
      <div>
        <label>Пароль</label>
        <input type="password" name="password" required />
      </div>
      <div>
        <label>Повтор пароля</label>
        <input type="password" name="confirm" required />
      </div>
    </div>
    <button type="submit">Создать аккаунт</button>
    <p style="margin-top:12px"><a href="/login">У меня уже есть аккаунт</a></p>
  </form>
</body>
</html>
