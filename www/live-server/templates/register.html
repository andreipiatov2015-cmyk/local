<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Регистрация</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="auth-page">
  <form class="card auth-card" method="post" action="/register">
    <h2>Регистрация</h2>
    <div class="form-field">
      <label>Имя пользователя</label>
      <input type="text" name="username" required />
    </div>
    <div class="form-field">
      <label>E-mail</label>
      <input type="email" name="email" required />
    </div>
    <div class="form-field" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label>Пароль</label>
        <input type="password" name="password" required />
      </div>
      <div>
        <label>Повтор пароля</label>
        <input type="password" name="confirm" required />
      </div>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Создать аккаунт</button>
    <p style="margin-top:12px"><a href="/login">У меня уже есть аккаунт</a></p>
  </form>
</body>
</html>
