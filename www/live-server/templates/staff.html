<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <style>
        body{margin:0;min-height:100vh;background:linear-gradient(135deg,#1f2937,#111827);
     font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;color:#e5e7eb;display:flex;flex-direction:column;align-items:center;padding:30px}
h1{margin-bottom:20px;color:#93c5fd}
.table-container{width:100%;max-width:900px;background:rgba(17,24,39,.95);
                 border:1px solid #374151;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,.4);overflow:hidden}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left}
th{background:#1f2937;color:#93c5fd;text-transform:uppercase;font-size:13px;letter-spacing:1px}
td{border-top:1px solid #374151}
tr:hover{background:#111827}
form{display:inline}
input[type=password],select{padding:6px 10px;border-radius:8px;border:1px solid #374151;background:#0b1220;color:#e5e7eb}
button{padding:6px 12px;border:none;border-radius:8px;
       background:linear-gradient(90deg,#3b82f6,#06b6d4);color:white;font-weight:600;cursor:pointer}
button:hover{filter:brightness(1.05)}
a{color:#93c5fd;text-decoration:none;margin-top:20px;display:inline-block}
a:hover{text-decoration:underline}

    </style>
</head>
<body>
    <h1>Сотрудники</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Имя</th>
                <th>Email</th>
                <th>Роль</th>
                <th>Подтверждён</th>
                <th>Управление</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.id }}</td>
                <td>{{ u.username }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.role }}</td>
                <td>{{ "Да" if u.is_verified else "Нет" }}</td>
                <td>
                    <!-- Смена роли -->
                    <form method="post" action="/staff/change_role/{{ u.id }}">
                        <select name="role">
                            <option value="viewer" {% if u.role=="viewer" %}selected{% endif %}>viewer</option>
                            <option value="editor" {% if u.role=="editor" %}selected{% endif %}>editor</option>
                            <option value="admin" {% if u.role=="admin" %}selected{% endif %}>admin</option>
                        </select>
                        <button type="submit">Изменить</button>
                    </form>

                    <!-- Смена пароля -->
                    <form method="post" action="/staff/change_password/{{ u.id }}">
                        <input type="password" name="new_password" placeholder="Новый пароль">
                        <button type="submit">Сменить</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <p><a href="/admin">← Назад в админку</a></p>
</body>
</html>
