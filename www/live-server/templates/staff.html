<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Управление пользователями</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body data-stream-url="{{ stream_url }}">
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo">🎥 Live Admin</span>
            <button id="collapseSidebar">❮</button>
        </div>
        <nav class="sidebar-menu">
            <a class="menu-item" href="/admin">
                <span class="icon">✏️</span>
                <span class="text">Редактор</span>
            </a>
            <a class="menu-item" href="/admin">
                <span class="icon">📥</span>
                <span class="text">Автодобавление</span>
            </a>
            <a class="menu-item" href="/competition">
                <span class="icon">🏆</span>
                <span class="text">Конкурс</span>
            </a>
            <a class="menu-item" href="/broadcast">
                <span class="icon">📺</span>
                <span class="text">Трансляция</span>
            </a>
            <a class="menu-item active" href="/staff">
                <span class="icon">👥</span>
                <span class="text">Сотрудники</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="menu-item logout">
                <span class="icon">🚪</span>
                <span class="text">Выход</span>
            </a>
        </div>
    </aside>

    <main class="content">
        <div class="card" style="width:100%;max-width:1000px;">
            <h1 class="page-title">Сотрудники</h1>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Имя</th>
                        <th>Email</th>
                        <th>Роль</th>
                        <th>Подтверждён</th>
                        <th>Управление</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr>
                        <td>{{ u.id }}</td>
                        <td>{{ u.username }}</td>
                        <td>{{ u.email }}</td>
                        <td>{{ u.role }}</td>
                        <td>{{ "Да" if u.is_verified else "Нет" }}</td>
                        <td>
                            <!-- Смена роли -->
                            <form method="post" action="/staff/change_role/{{ u.id }}">
                                <select name="role">
                                    <option value="viewer" {% if u.role=="viewer" %}selected{% endif %}>viewer</option>
                                    <option value="editor" {% if u.role=="editor" %}selected{% endif %}>editor</option>
                                    <option value="admin" {% if u.role=="admin" %}selected{% endif %}>admin</option>
                                </select>
                                <button type="submit" class="btn btn-secondary">Изменить</button>
                            </form>

                            <!-- Смена пароля -->
                            <form method="post" action="/staff/change_password/{{ u.id }}">
                                <input type="password" name="new_password" placeholder="Новый пароль">
                                <button type="submit" class="btn btn-primary">Сменить</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

    <script src="/static/layout.js"></script>
</body>
</html>
