<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Таблица заявок</title>
  <link rel="stylesheet" href="/static/admin.css" />
  <link rel="stylesheet" href="/static/tables.css" />
</head>
<body class="tables-page" data-table-id="{{ table_id }}">
  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="logo">🎥 Live Admin</span>
      <button id="collapseSidebar" aria-label="Свернуть меню">❮</button>
    </div>
    <nav class="sidebar-menu">
      <a class="menu-item" href="/admin"><span class="icon">✏️</span><span class="text">Редактор</span></a>
      <a class="menu-item" href="/competition"><span class="icon">🏆</span><span class="text">Конкурс</span></a>
      <a class="menu-item" href="/broadcast"><span class="icon">📺</span><span class="text">Трансляция</span></a>
      <a class="menu-item" href="/staff"><span class="icon">👥</span><span class="text">Сотрудники</span></a>
      <a class="menu-item active" href="/tables"><span class="icon">📋</span><span class="text">Таблицы заявок</span></a>
    </nav>
    <div class="sidebar-footer">
      <a href="/logout" class="menu-item logout"><span class="icon">🚪</span><span class="text">Выход</span></a>
    </div>
  </aside>

  <main class="content tables-content">
    <section class="card page-card">
      <div class="tables-list-header">
        <div>
          <a class="hint" href="/tables">← К списку таблиц</a>
          <h1 class="page-title" id="tableTitle">Таблица</h1>
        </div>
      </div>

      <section class="card section-card">
        <h2 class="section-title">1. Загрузка Excel</h2>
        <div class="row wrap">
          <input id="excelFile" type="file" accept=".xlsx,.xls" />
          <button id="uploadExcel" class="btn btn-primary" type="button">Загрузить</button>
        </div>
        <p id="uploadStatus" class="status status-muted">Ожидание действия.</p>
      </section>

      <section class="card section-card mapping-section-card" id="mappingSectionCard">
        <div class="section-title-row">
          <h2 class="section-title">2. Схема колонок</h2>
          <button id="toggleMappingSection" class="section-collapse-btn" type="button" aria-expanded="true" aria-controls="mappingSectionBody" title="Свернуть блок «Схема колонок»">▲</button>
        </div>
        <div id="mappingSectionBody" class="section-body-collapsible">
          <div class="mapping-toolbar">
            <button id="collapseConfigured" class="btn btn-secondary btn-small" type="button">Свернуть все настроенные</button>
          </div>
          <div id="mappingList" class="mapping-list"></div>
          <div class="row wrap">
            <button id="saveMapping" class="btn btn-primary" type="button">Сохранить mapping</button>
            <span id="mappingStatus" class="status status-muted">Ожидание.</span>
          </div>
        </div>
      </section>

      <section class="card section-card">
        <h2 class="section-title">3. Предпросмотр Excel</h2>
        <p id="previewMeta" class="hint">Нет данных.</p>
        <div class="preview-wrap">
          <div id="previewCards" class="preview-cards"></div>
        </div>
      </section>

      <section class="card section-card documentation-section-card">
        <h2 class="section-title">Документация</h2>
        <div class="documentation-program-card">
          <h3 class="documentation-subtitle">Программа конкурса</h3>
          <div class="doc-form-grid">
            <label class="doc-form-field">
              <span>Дата мероприятия</span>
              <input id="docEventDate" type="date" />
            </label>
            <label class="doc-form-field">
              <span>Время начала репетиций</span>
              <input id="docRehearsalStart" type="time" />
            </label>
            <label class="doc-form-field">
              <span>Время начала конкурсной программы</span>
              <input id="docCompetitionStart" type="time" />
            </label>
            <label class="doc-form-field">
              <span>Подведение итогов (мин.)</span>
              <input id="docResultsMinutes" type="number" min="0" step="1" />
            </label>
            <label class="doc-form-field">
              <span>Награждение (мин.)</span>
              <input id="docAwardMinutes" type="number" min="0" step="1" />
            </label>
            <label class="doc-form-field">
              <span>Технический интервал (мин.)</span>
              <input id="docTechIntervalMinutes" type="number" min="0" step="1" />
            </label>
            <label class="doc-form-field">
              <span>Длительность номера по умолчанию (мин.)</span>
              <input id="docDefaultDurationMinutes" type="number" min="1" step="1" />
            </label>
          </div>
          <div class="row wrap">
            <button id="docBuildProgram" class="btn btn-primary" type="button">Сформировать программу</button>
            <span id="docProgramStatus" class="status status-muted">Ожидание.</span>
          </div>
          <button id="programDocCard" class="program-doc-card" type="button">
            <span class="program-doc-card-icon" aria-hidden="true">
              <svg viewBox="0 0 64 64" role="img">
                <path d="M16 4h24l12 12v44H16z" fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
                <path d="M40 4v14h14" fill="#dbeafe" stroke="#1e3a8a" stroke-width="2"/>
                <rect x="10" y="20" width="22" height="30" rx="4" fill="#1d4ed8"/>
                <text x="21" y="40" text-anchor="middle" font-size="17" font-weight="700" fill="#fff" font-family="Arial, sans-serif">W</text>
              </svg>
            </span>
            <span class="program-doc-card-text">
              <span class="program-doc-card-title">Программа выступлений</span>
              <span class="program-doc-card-subtitle">DOCX · открыть предпросмотр и скачать файл</span>
            </span>
          </button>
        </div>
      </section>
    </section>
  </main>

  <div id="programPreviewModal" class="modal" aria-hidden="true">
    <div class="modal-content program-preview-modal-content">
      <div class="vk-modal-header">
        <h3>Предпросмотр программы выступлений</h3>
        <button id="closeProgramPreviewModal" class="close-modal-btn" type="button">✕</button>
      </div>
      <div id="programPreviewModalBody" class="program-preview-modal-body"></div>
      <div class="row wrap program-preview-modal-actions">
        <button id="downloadProgramDocx" class="btn btn-primary" type="button">Скачать</button>
      </div>
    </div>
  </div>

  <script src="/static/layout.js"></script>
  <script src="/static/tables.js"></script>
</body>
</html>
