<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конкурс</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body data-stream-url="{{ stream_url }}">
    <aside class="sidebar">
        <div class="sidebar-header">
            <span class="logo">🎥 Live Admin</span>
            <button id="collapseSidebar">❮</button>
        </div>
        <nav class="sidebar-menu">
            <a class="menu-item" href="/admin">
                <span class="icon">✏️</span>
                <span class="text">Редактор</span>
            </a>
            <a class="menu-item" href="/admin">
                <span class="icon">📥</span>
                <span class="text">Автодобавление</span>
            </a>
            <a class="menu-item active" href="/competition">
                <span class="icon">🏆</span>
                <span class="text">Конкурс</span>
            </a>
            <a class="menu-item" href="/broadcast">
                <span class="icon">📺</span>
                <span class="text">Трансляция</span>
            </a>
            <a class="menu-item" href="/staff">
                <span class="icon">👥</span>
                <span class="text">Сотрудники</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="menu-item logout">
                <span class="icon">🚪</span>
                <span class="text">Выход</span>
            </a>
        </div>
    </aside>

    <main class="content">
        <div class="card" style="width:100%;max-width:900px;">
            <div class="vk-actions" style="margin-bottom:16px;">
                <button id="undoButton" class="btn btn-secondary" type="button">Назад</button>
                <button id="redoButton" class="btn btn-secondary" type="button">Вперёд</button>
            </div>
            <div class="entries-list" id="entriesContainer"></div>
        </div>
    </main>

    <script src="/static/layout.js"></script>

    <script>
        let entriesHistory = [];
        let currentHistoryIndex = -1;

        function loadCompetitionEntries() {
            fetch('/entries')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('entriesContainer');
                    container.innerHTML = '';
                    const layout = JSON.parse(localStorage.getItem('previewLayout') || '{}');
                    data.forEach(entry => {
                        const entryDiv = document.createElement('div');
                        entryDiv.classList.add('entry');
                        entryDiv.draggable = true;
                        entryDiv.innerHTML = `
                            <span class="move-handle">☰</span>
                            <span class="remove-cross">✖</span>
                            <span class="entry-field" id="entry-number-${entry.id}">№${entry.id}</span>
                            <span class="entry-field" id="entry-fio-${entry.id}">${entry.name || ''}</span>
                            <span class="entry-field" id="entry-act-${entry.id}">${entry.performance || ''}</span>
                            <span class="entry-field" id="entry-team-${entry.id}">${entry.group || ''}${entry.territory ? ', ' + entry.territory : ''}</span>
                        `;
                        applyPreviewLayout(entryDiv, entry.id, layout);
                        container.appendChild(entryDiv);
                    });
                    addDragAndDropListeners();
                    addRemoveListeners();
                    saveHistory(data);
                })
                .catch(error => {
                    container.innerHTML = '<p>Ошибка загрузки данных.</p>';
                });
        }

        function applyPreviewLayout(entryDiv, id, layout) {
            const fields = [
                { selector: `#entry-number-${id}`, key: 'number' },
                { selector: `#entry-fio-${id}`, key: 'fio' },
                { selector: `#entry-act-${id}`, key: 'act' },
                { selector: `#entry-team-${id}`, key: 'team' }
            ];
            fields.forEach(field => {
                const element = entryDiv.querySelector(field.selector);
                if (element && layout[field.key]) {
                    element.style.left = layout[field.key].left || '10px';
                    element.style.top = layout[field.key].top || '10px';
                    element.style.fontSize = layout[field.key].fontSize || '16px';
                    element.style.fontFamily = layout[field.key].fontFamily || 'Arial';
                    element.style.fontWeight = layout[field.key].fontWeight || 'normal';
                    element.style.fontStyle = layout[field.key].fontStyle || 'normal';
                    element.style.textAlign = layout[field.key].textAlign || 'left';
                    element.style.alignItems = layout[field.key].alignItems || 'flex-start';
                }
            });
        }

        function addDragAndDropListeners() {
            const container = document.getElementById('entriesContainer');
            let draggedEntry = null;
            let startX = 0;

            container.addEventListener('dragstart', (e) => {
                const entry = e.target.closest('.entry');
                if (entry && e.target.classList.contains('move-handle')) {
                    draggedEntry = entry;
                    startX = e.clientX;
                    draggedEntry.classList.add('dragging');
                    e.dataTransfer.setData('text/plain', '');
                }
            });

            container.addEventListener('dragover', (e) => {
                e.preventDefault();
                if (draggedEntry) {
                    const currentX = e.clientX;
                    if (currentX - startX > 50) { // Сдвиг вправо более 50px
                        draggedEntry.classList.add('show-cross');
                    } else {
                        draggedEntry.classList.remove('show-cross');
                    }
                    const targetEntry = e.target.closest('.entry');
                    if (targetEntry && targetEntry !== draggedEntry) {
                        const rect = targetEntry.getBoundingClientRect();
                        const next = (e.clientY - rect.top) / rect.height > 0.5;
                        container.insertBefore(draggedEntry, next ? targetEntry.nextSibling : targetEntry);
                    }
                }
            });

            container.addEventListener('dragend', (e) => {
                if (draggedEntry) {
                    draggedEntry.classList.remove('dragging');
                    draggedEntry.classList.remove('show-cross');
                    draggedEntry = null;
                    updateOrderAndSave();
                }
            });
        }

        function addRemoveListeners() {
            const container = document.getElementById('entriesContainer');
            container.addEventListener('click', (e) => {
                if (e.target.classList.contains('remove-cross')) {
                    const entry = e.target.closest('.entry');
                    const id = parseInt(entry.querySelector('.entry-field').id.split('-')[2]);
                    fetch(`/delete_entry/${id}`, {
                        method: 'DELETE'
                    }).then(response => response.json())
                      .then(data => {
                          entry.remove();
                          updateOrderAndSave();
                      })
                      .catch(() => {
                          // Обработка ошибки
                      });
                }
            });
        }

        function updateOrderAndSave() {
            const entries = Array.from(document.querySelectorAll('#entriesContainer .entry')).map((entry, index) => {
                const id = parseInt(entry.querySelector('.entry-field').id.split('-')[2]);
                const cells = entry.querySelectorAll('.entry-field');
                return {
                    id: index + 1,
                    name: cells[1].textContent,
                    performance: cells[2].textContent,
                    group: cells[3].textContent,
                    territory: cells[4] ? cells[4].textContent.split(', ')[1] : ''
                };
            });

            fetch('/reorder_entries', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entries)
            }).then(response => response.json())
              .then(() => {
                  saveHistory(entries);
              })
              .catch(() => {
                  // Обработка ошибки
              });
        }

        function saveHistory(entries) {
            if (currentHistoryIndex < entriesHistory.length - 1) {
                entriesHistory = entriesHistory.slice(0, currentHistoryIndex + 1);
            }
            entriesHistory.push([...entries]);
            currentHistoryIndex = entriesHistory.length - 1;
        }

        document.getElementById('undoButton').addEventListener('click', () => {
            if (currentHistoryIndex > 0) {
                currentHistoryIndex--;
                applyHistory();
            }
        });

        document.getElementById('redoButton').addEventListener('click', () => {
            if (currentHistoryIndex < entriesHistory.length - 1) {
                currentHistoryIndex++;
                applyHistory();
            }
        });

        function applyHistory() {
            if (currentHistoryIndex >= 0 && currentHistoryIndex < entriesHistory.length) {
                fetch('/reorder_entries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(entriesHistory[currentHistoryIndex])
                }).then(response => response.json())
                  .then(() => loadCompetitionEntries())
                  .catch(() => {
                      // Обработка ошибки
                  });
            }
        }

        loadCompetitionEntries();
        setInterval(loadCompetitionEntries, 10000);
    </script>
</body>
</html>
