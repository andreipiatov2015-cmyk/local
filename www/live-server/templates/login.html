<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
     background:linear-gradient(135deg,#3b82f6 0%,#06b6d4 100%);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
.card{width:420px;background:rgba(17,24,39,.92);border:1px solid rgba(255,255,255,.08);
      border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.25);padding:28px;color:#e5e7eb}
h2{margin:0 0 16px;font-size:22px;text-align:center}
label{display:block;font-size:13px;color:#cbd5e1;margin:12px 0 6px}
input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #374151;
      background:#0b1220;color:#e5e7eb}
input:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.2);outline:none}
button{width:100%;margin-top:16px;padding:12px 14px;border:0;border-radius:10px;
       background:linear-gradient(90deg,#3b82f6,#06b6d4);color:white;font-weight:700;cursor:pointer}
button:hover{filter:brightness(1.05)}
a{color:#93c5fd;text-decoration:none;font-size:14px;display:block;text-align:center;margin-top:12px}

    </style>
</head>
<body>
    <div class="login-box">
        <h2>Вход</h2>
        <form method="post" action="/login">
            <label for="email">Логин</label>
            <input type="text" name="username" placeholder="Логин или E-mail" required>
            
            <label for="password">Пароль</label>
            <input type="password" name="password" required>
            
            <button type="submit">Войти</button>
        </form>
        <a href="/register" class="link">Регистрация</a>
    </div>
</body>
</html>
