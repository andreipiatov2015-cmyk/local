<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="/static/admin.css">
</head>
<body class="auth-page">
    <div class="card auth-card">
        <h2>Вход</h2>
        <form method="post" action="/login" class="auth-form">
            <div class="form-field">
                <label for="username">Логин</label>
                <input id="username" type="text" name="username" placeholder="Логин или E-mail" required>
            </div>
            <div class="form-field">
                <label for="password">Пароль</label>
                <input id="password" type="password" name="password" required>
            </div>
            {% if error_message %}
            <div class="auth-alert auth-alert-error">{{ error_message }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary auth-submit">Войти</button>
        </form>
        <div class="auth-links">
            <a href="/broadcast" class="btn btn-secondary auth-link-btn">Перейти к трансляции</a>
            <a href="/register" class="auth-text-link">Регистрация</a>
            <span class="auth-text-link auth-text-link-muted">Восстановление пароля скоро будет доступно</span>
        </div>
    </div>
</body>
</html>
