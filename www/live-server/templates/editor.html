<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мероприятия</title>
    <link rel="stylesheet" href="../static/admin.css">
</head>
<body>
    {% import "_sidebar.html" as nav %}
    {% call nav.render_sidebar("events") %}
      <button id="vkStreamButton" class="vk-btn">⚙️ Настройка трансляции</button>
    {% endcall %}

    <main class="content">
        <div class="card" style="width:100%;max-width:1100px;">
            <h1 class="page-title">Мероприятия</h1>
            <button id="openModal" class="btn btn-primary" type="button">Создать мероприятие</button>

            <table id="eventsTable" class="editor-table" style="margin-top:20px;">
                <thead>
                    <tr><th>ID</th><th>Название</th><th>Адрес</th><th>Дата начала</th><th>Дата окончания</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <!-- Модальное окно -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <h2>Новое мероприятие</h2>
            <div class="form-field">
                <label>Название:</label>
                <input type="text" id="title" required>
            </div>
            <div class="form-field">
                <label>Адрес:</label>
                <input type="text" id="address" required>
            </div>
            <div class="form-field">
                <label>Дата начала:</label>
                <input type="date" id="start_date" required>
            </div>
            <div class="form-field">
                <label>Дата окончания:</label>
                <input type="date" id="end_date" required>
            </div>
            <div class="vk-actions">
                <button id="saveEvent" class="btn btn-primary" type="button">Сохранить</button>
                <button class="btn btn-secondary" type="button" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>

    <!-- VK Modal -->
    <div id="vkModal" class="vk-modal">
      <div class="vk-modal-content">
        <div class="vk-modal-header">
          <h3>Настройка трансляции</h3>
          <button id="vkCloseBtn" class="icon-btn" type="button">✕</button>
        </div>

        <div class="vk-tabs">
          <button class="vk-tab active" data-tab="settings" type="button">Настройки</button>
          <button class="vk-tab" data-tab="targets" type="button">Сервера</button>
        </div>

        <div class="vk-tab-panel active" data-panel="settings">
          <div class="vk-preview">
            <div class="vk-preview-media">
              <video id="vkPreviewVideo" controls muted></video>
              <img id="vkPreviewImage" alt="Превью трансляции">
            </div>

            <div>
              <div class="form-field">
                <label for="vkTitle">Название</label>
                <input id="vkTitle" type="text">
              </div>

              <div class="form-field">
                <label for="vkDate">Дата (YYYY-MM-DD)</label>
                <input id="vkDate" type="date">
              </div>

              <div class="form-field">
                <label for="vkTime">Время (HH:MM)</label>
                <input id="vkTime" type="time">
              </div>

              <div class="form-field">
                <label for="vkImage">Превью (jpg/png)</label>
                <input id="vkImage" type="file" accept="image/*">
              </div>

              <div class="vk-actions">
                <button id="vkScheduleBtn" class="btn btn-secondary" type="button">Трансляция в</button>
                <button id="vkStopBtn" class="btn btn-danger" type="button">Остановить трансляцию</button>
              </div>
            </div>
          </div>
        </div>

        <div class="vk-tab-panel" data-panel="targets">
          <div class="vk-targets">
            <div class="card">
              <div class="form-field">
                <label for="vkTargetName">Название направления</label>
                <input id="vkTargetName" type="text" placeholder="Например, VK группа или Телевизоры">
              </div>

              <div class="form-field">
                <label for="vkTargetUrl">RTMP URL (если требуется)</label>
                <input id="vkTargetUrl" type="text" placeholder="rtmp://...">
              </div>

              <div class="vk-actions">
                <button id="vkAddTargetBtn" class="btn btn-primary" type="button">+</button>
                <span class="vk-hint">Добавить сервер</span>
              </div>
            </div>

            <div id="vkTargetsList" class="vk-targets-list"></div>
            <p id="vkTargetsEmpty" class="status-text"></p>
          </div>
        </div>

      </div>
    </div>

    <div id="vkBroadcastModal" class="vk-modal">
      <div class="vk-modal-content">
        <div class="vk-modal-header">
          <h3>Транслировать в</h3>
          <button id="vkBroadcastClose" class="icon-btn" type="button">✕</button>
        </div>

        <div id="vkBroadcastList" class="vk-targets"></div>
        <p id="vkBroadcastNotice" class="status-text"></p>

        <div class="vk-actions">
          <button id="vkBroadcastConfirm" class="btn btn-primary" type="button" disabled>Да</button>
          <button id="vkBroadcastCancel" class="btn btn-secondary" type="button">Нет</button>
        </div>
      </div>
    </div>

    <script src="/static/layout.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.12/dist/hls.min.js"></script>
    <script src="/static/vk-broadcast.js"></script>

    <script>
        const modal = document.getElementById("eventModal");
        const openModalBtn = document.getElementById("openModal");
        const saveEventBtn = document.getElementById("saveEvent");
        const tableBody = document.querySelector("#eventsTable tbody");

        openModalBtn.onclick = () => modal.classList.add("visible");
        function closeModal() { modal.classList.remove("visible"); }

        async function loadEvents() {
            const res = await fetch("/events");
            const events = await res.json();
            tableBody.innerHTML = "";
            events.forEach(e => {
                let row = `<tr>
                    <td>${e.id}</td>
                    <td>${e.title}</td>
                    <td>${e.address}</td>
                    <td>${e.start_date}</td>
                    <td>${e.end_date}</td>
                </tr>`;
                tableBody.innerHTML += row;
            });
        }

        saveEventBtn.onclick = async () => {
            const title = document.getElementById("title").value;
            const address = document.getElementById("address").value;
            const start_date = document.getElementById("start_date").value;
            const end_date = document.getElementById("end_date").value;

            const res = await fetch("/create_event", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({title, address, start_date, end_date})
            });

            if(res.ok){
                closeModal();
                loadEvents();
            }
        };

        loadEvents();
    </script>
</body>
</html>
