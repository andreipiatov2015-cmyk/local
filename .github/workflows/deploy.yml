name: Deploy to server

on:
  push:
    branches:
      - local
  workflow_dispatch:

concurrency:
  group: deploy-var-www
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, prod]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync repository www/ to /var/www
        run: |
          rsync -av \
            --exclude ".git/" \
            --exclude ".github/" \
            "$GITHUB_WORKSPACE"/www/ /var/www/

      - name: Fix modes
        run: |
          find /var/www -type d -exec chmod 775 {} \;
          find /var/www -type f -exec chmod 664 {} \;
