# Nginx RTMP Module Configuration
# For HLS streaming and RTMP ingest

rtmp {
    out_queue 4096;
    out_cork 8;
    max_message 10485760;
    accept_resource 16384;
    timeout 60s;
    keepalive 75s;

    # HLS Settings
    hls on;
    hls_path /var/www/hls;
    hls_fragment 3s;
    hls_playlist_length 30s;
    hls_continuous on;
    hls_cleanup on;
    hls_nested on;

    # Recording
    record all;
    record_path /var/www/recordings;
    record_unique on;
    record_suffix -%Y%m%d-%H%M%S.flv;

    # Application for main streaming
    application live {
        live on;
        meta off;
        wait_key on;
        wait_video on;
        publish_notification on;

        # HLS output
        hls on;
        hls_path /var/www/hls;
        hls_fragment 2s;
        hls_playlist_length 10s;
        hls_cleanup on;

        # Play from HLS if available, otherwise RTMP
        play /var/www/hls;
    }

    # Application for replay/rebroadcast
    application reboot {
        live on;
        meta off;
        play_restart on;

        # HLS output for replay
        hls on;
        hls_path /var/www/reboot/hls;

        # Exec for custom processing (VK push, etc.)
        # exec_kill_signal term;
    }

    # Stats page
    application stat {
        live on;
        meta off;

        # Disable play
        play /tmp;
    }
}

# Statistics server
server {
    listen 8082;
    server_name _;

    location / {
        rtmp_stat all;
        rtmp_stat_stylesheet /stat.xsl;
    }

    location /stat.xsl {
        alias /usr/local/nginx/html/stat.xsl;
    }
}